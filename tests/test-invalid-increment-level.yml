name: Test invalid increment-level input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with invalid increment-level (expect failure)
        id: action
        uses: .
        continue-on-error: true
        env:
          GITHUB_EVENT_NAME: push
          GITHUB_REF: refs/heads/main
          GITHUB_REPOSITORY: test-owner/test-repo
          GITHUB_RUN_ID: '1'
          GITHUB_SERVER_URL: https://github.com
        with:
          major-version: '1'
          increment-level: invalid
          dry-run: 'true'
          token: fake-token

      - name: Assert action failed with invalid increment-level
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid increment-level, but got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid increment-level"
