name: Test dry-run mode on pull_request event
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # In pull_request context, dry-run defaults to true.
      # The action will attempt git fetch and GitHub API calls which will fail
      # in a local act environment without real credentials, but we verify
      # that input parsing succeeds (no assertion error on increment-level).
      - name: Run action in dry-run mode (pull_request event)
        id: action
        uses: .
        continue-on-error: true
        env:
          GITHUB_EVENT_NAME: pull_request
          GITHUB_REF: refs/pull/1/merge
          GITHUB_HEAD_REF: feature-branch
          GITHUB_BASE_REF: main
          GITHUB_REPOSITORY: test-owner/test-repo
          GITHUB_RUN_ID: '1'
          GITHUB_SERVER_URL: https://github.com
        with:
          major-version: '1'
          increment-level: minor
          dry-run: 'true'
          token: fake-token

      - name: Assert action did not fail due to invalid inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action may fail due to missing GitHub API credentials in act,
          # but it should NOT fail due to input validation errors.
          # We accept both success and failure (from API calls), but not
          # a failure caused by invalid increment-level assertion.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with valid inputs (outcome=$OUTCOME)"
          else
            echo "FAIL: unexpected outcome=$OUTCOME"
            exit 1
          fi
